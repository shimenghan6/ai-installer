<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#1a1a2e;color:#eee;height:100vh;display:flex;flex-direction:column}
header{background:#16213e;padding:12px 20px;text-align:center;font-size:15px;color:#a0a0b0}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:12px 16px;border-radius:12px;line-height:1.7;font-size:14px;white-space:pre-wrap}
.user{align-self:flex-end;background:#0f3460;color:#e0e0ff}
.ai{align-self:flex-start;background:#16213e;color:#d0d0d0}
#input-area{display:flex;padding:12px;gap:8px;background:#16213e;border-top:1px solid #0f3460}
#input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #0f3460;background:#1a1a2e;color:#eee;font-size:14px;outline:none}
#input:focus{border-color:#533483}
#send{padding:10px 20px;border-radius:8px;border:none;background:#533483;color:#fff;cursor:pointer;font-size:14px}
</style></head>
<body>
<header>AI</header>
<div id="model-info"></div>
<div id="chat"></div>
<div id="input-area"><input id="input" placeholder="..." autofocus><button id="send">Send</button></div>
<script>window.API="http://127.0.0.1:11434/api";var model="",messages=[];document.getElementById("send").onclick=function s(){var t=document.getElementById("input").value.trim();if(!t)return;document.getElementById("input").value="";var u=document.createElement("div");u.className="msg user";u.textContent=t;document.getElementById("chat").appendChild(u);var a=document.createElement("div");a.className="msg ai";a.textContent="...";document.getElementById("chat").appendChild(a);a.scrollIntoView({behavior:"smooth"});fetch(API+"/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:model,messages:[{role:"user",content:t}],stream:!1})}).then(function(r){return r.json()}).then(function(d){a.textContent=d.message.content;a.scrollIntoView({behavior:"smooth"})}).catch(function(e){a.textContent="Error: "+e.message})};(function(){fetch(API+"/tags").then(function(r){return r.json()}).then(function(d){if(d.models&&d.models.length){model=d.models[0].name;document.getElementById("model-info").textContent=model}}).catch(function(){document.getElementById("model-info").textContent="Not connected"})})()</script>
</body></html>
